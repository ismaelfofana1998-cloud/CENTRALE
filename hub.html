<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Hub — IKMS</title>
<link rel="stylesheet" href="./assets/css/theme.css">
<link rel="stylesheet" href="./assets/css/centrale.css">
<link rel="stylesheet" href="./assets/css/hub.css">
</head>
<body>
<div class="app-hub">

  <header class="topbar">
    <div class="identite">
      <span class="nom" id="topbar-nom">Chargement…</span>
      <span class="hub">Espace hub</span>
    </div>
    <button class="btn-deconnexion" id="btn-deconnexion" type="button">Quitter</button>
  </header>

  <main class="contenu-hub" id="contenu">
    <div class="chargement">Chargement…</div>
  </main>

  <nav class="onglets" aria-label="Navigation hub">
    <button class="onglet" data-onglet="A_VALIDER" aria-current="true" type="button">
      <span class="onglet-icone" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
      </span>
      <span class="onglet-libelle">À valider</span>
      <span class="onglet-badge" id="badge-valider" hidden>0</span>
    </button>
    <button class="onglet" data-onglet="LOTS" type="button">
      <span class="onglet-icone" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8V21H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg>
      </span>
      <span class="onglet-libelle">Lots</span>
      <span class="onglet-badge" id="badge-lots" hidden>0</span>
    </button>
  </nav>

</div>

<script src="./assets/js/config.public.js"></script>
<script type="module" src="./assets/js/hub.js"></script>
</body>
</html>
